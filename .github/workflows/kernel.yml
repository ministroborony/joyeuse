name: Build Mainline Kernel for Joyeuse

on:
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  build-joyeuse-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libc6-dev libncurses5-dev crossbuild-essential-arm64 git

      - name: Clone Mainline Kernel Source
        run: |
          # Клонируем ветку ядра для SM7125
          git clone --depth=1 https://github.com/sm7125-mainline/linux.git kernel

      - name: Configure and Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # ШАГ 1: Генерируем базовый дефконфиг ARM64 (создает основу .config)
          make defconfig
          
          # ШАГ 2: Накладываем специфичные настройки процессора sm7125 поверх базы
          ./scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/sm7125.config
          
          # ШАГ 3: Принудительно включаем параметры ядра для UEFI (Silicium/EDK2) и Systemd
          ./scripts/config --enable CONFIG_EFI
          ./scripts/config --enable CONFIG_EFI_STUB
          ./scripts/config --enable CONFIG_CGROUPS
          ./scripts/config --enable CONFIG_BLK_DEV_INITRD
          ./scripts/config --enable CONFIG_SIMPLE_FB
          ./scripts/config --enable CONFIG_FB_SIMPLE
          ./scripts/config --enable CONFIG_FRAMEBUFFER_CONSOLE
          
          # ШАГ 4: Пересобираем и проверяем финальный .config
          make olddefconfig
          
          # ШАГ 5: Запускаем компиляцию ядра Image и дерева устройств (DTB)
          make -j$(nproc) Image dtbs

      - name: Package Joyeuse Artifacts
        run: |
          mkdir -p output
          # Копируем скомпилированное EFI-ядро
          cp kernel/arch/arm64/boot/Image output/Image
          
          # Ищем и копируем строго DTB файл для joyeuse
          find kernel/arch/arm64/boot/dts/qcom/ -name "*joyeuse*.dtb" -exec cp {} output/ \;

      - name: Upload Joyeuse Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Joyeuse
          path: output/*
